framework:
    cache:
        # Unique name of your app: used to compute stable namespaces for cache keys.
        #prefix_seed: your_vendor_name/app_name

        # The "app" cache stores to the filesystem by default.
        # The data in this cache should persist between deploys.
        # Other options include:

        # Redis
        #app: cache.adapter.redis
        #default_redis_provider: redis://localhost

        # APCu (not recommended with heavy random-write workloads as memory fragmentation can cause perf issues)
        #app: cache.adapter.apcu

        # Namespaced pools use the above "app" backend by default
        pools:
            academy.cache:
                adapter: cache.adapter.filesystem
                default_lifetime: 3600

            # Cache des profils OAV agrégés du mortier (moteur de compatibilité).
            # Clé = "match.mortar.{id1},{id2},…". TTL 24h.
            # Invalidé par RecomputeOavTableHandler après chaque rebuild OAV.
            match.mortar_profile.cache:
                adapter: cache.adapter.filesystem
                default_lifetime: 86400

            # Cache des top-pairs / top-triplets (SpiceGroupFinderService).
            # O(N²)/O(N³) SQL self-joins — résultat stable entre deux modifications d'épices.
            # TTL 1h — invalidation TTL uniquement (pas d'invalidation event-driven pour MVP).
            spice.compatibility.cache:
                adapter: cache.adapter.filesystem
                default_lifetime: 3600

            # Cache des insights physico-chimiques sur la page recette (Étape 3E-3) :
            #   - MatrixComparator : 3× MatchPipeline (rankings par matrice)
            #   - CookingTimelineBuilder : classification cinétique + rétention
            # Clé = "match.insights.{type}.{mortarIds_hash}.{ctx_hash}". TTL 1h.
            # Invalidé via TTL (pas event-driven — un rebuild OAV invalide indirectement
            # via le cache niveau mortar_profile sur lequel s'appuie le pipeline).
            match.insights.cache:
                adapter: cache.adapter.filesystem
                default_lifetime: 3600
