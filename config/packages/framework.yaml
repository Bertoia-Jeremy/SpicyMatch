# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'
    #csrf_protection: true
    annotations: false
    http_method_override: false
    handle_all_throwables: true

    # Enables session support. Note that the session will ONLY be started if you read or write from it.
    # Remove or comment this section to explicitly disable session support.
    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax

    #esi: true
    fragments: true
    php_errors:
        log: true

    rate_limiter:
        # Existing — applied inline in EasterEggController.
        gamification_api:
            policy: 'token_bucket'
            limit: 20
            rate: { interval: '1 minute', amount: 20 }
        # Live Component actions (answer, pick, guess, guessLetter, etc.) — applied by RateLimitListener.
        lc_actions:
            policy: 'token_bucket'
            limit: 60
            rate: { interval: '1 minute', amount: 60 }
        # User-triggered mutations (toggle gamification, equip badge, rename history). Lower cap — these are rare in normal use.
        user_actions:
            policy: 'token_bucket'
            limit: 30
            rate: { interval: '1 minute', amount: 30 }

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
