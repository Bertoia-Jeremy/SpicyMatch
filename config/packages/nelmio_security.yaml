nelmio_security:
    # Send X-Frame-Options to block clickjacking.
    clickjacking:
        paths:
            '^/.*': DENY

    # Strict-Transport-Security — 1 year, include subdomains.
    forced_ssl:
        enabled: false # Enable in prod only (see when@prod below)
        hsts_max_age: 31536000
        hsts_subdomains: true
        hsts_preload: false

    # X-Content-Type-Options: nosniff.
    content_type:
        nosniff: true

    # Referrer-Policy
    referrer_policy:
        policies:
            - 'strict-origin-when-cross-origin'

    # XSS protection — X-XSS-Protection is deprecated but some scanners still flag its absence.
    xss_protection:
        enabled: true
        mode_block: true

    csp:
        enabled: true
        hosts: []
        content_types: []
        enforce:
            # Base directives — whitelisted origins come from CLAUDE.md stack:
            #   - FontAwesome CSS/fonts: cdnjs.cloudflare.com
            #   - Alpine.js / Stimulus ESM: jsdelivr.net (importmap)
            #   - Turbo + app code: self
            default-src:
                - 'self'
            # Kept 'unsafe-inline' on script-src because Alpine.js attribute
            # handlers (`@click="..."`, `x-data="..."`) are inline scripts under
            # CSP2. The high-risk inline scripts (timers with setInterval,
            # toast auto-dismiss, fetch callbacks) have been migrated to
            # Stimulus controllers — only lightweight DOM toggles remain inline.
            # Full strict script-src requires Alpine CSP build + Alpine.data()
            # refactor of every x-data literal (tracked in backlog).
            script-src:
                - 'self'
                - "'unsafe-inline'"
                - 'https://cdn.jsdelivr.net'
            style-src:
                - 'self'
                - "'unsafe-inline'" # Tailwind utility classes + inline style="..." for rarity colors
                - 'https://cdnjs.cloudflare.com'
            img-src:
                - 'self'
                - 'data:'
                - 'blob:'
            connect-src:
                - 'self'
            font-src:
                - 'self'
                - 'https://cdnjs.cloudflare.com'
                - 'data:'
            frame-ancestors:
                - "'none'"
            base-uri:
                - "'self'"
            form-action:
                - "'self'"
            object-src:
                - "'none'"

when@prod:
    nelmio_security:
        forced_ssl:
            enabled: true

when@test:
    nelmio_security:
        csp:
            enforce:
                # Relaxed for tests — BrowserKit doesn't enforce headers but some
                # assertions check their presence.
                default-src: ['*']
                script-src: ['*', "'unsafe-inline'", "'unsafe-eval'"]
                style-src: ['*', "'unsafe-inline'"]
