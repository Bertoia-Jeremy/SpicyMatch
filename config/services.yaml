# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    spice_images: /uploads/spices

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # Gamification XP strategies — tagged for injection into GamificationManager
    App\Gamification\Strategy\:
        resource: '../src/Gamification/Strategy/'
        tags: ['gamification.xp_strategy']

    # Route gamification logger → `gamification` Monolog channel (structured JSON).
    App\Service\GamificationManager:
        arguments:
            $logger: '@monolog.logger.gamification'

    App\Service\EasterEggService:
        arguments:
            $logger: '@monolog.logger.gamification'

    App\MessageHandler\GamificationHandler:
        arguments:
            $logger: '@monolog.logger.gamification'

    App\MessageHandler\EasterEggGamificationHandler:
        arguments:
            $logger: '@monolog.logger.gamification'

    App\MessageHandler\SpiceReadGamificationHandler:
        arguments:
            $logger: '@monolog.logger.gamification'

    App\MessageHandler\FavoriteGamificationHandler:
        arguments:
            $logger: '@monolog.logger.gamification'

    App\MessageHandler\GameGamificationHandler:
        arguments:
            $logger: '@monolog.logger.gamification'

    # Sentry before_send hook — must be public for the Sentry bundle to wire it.
    App\Observability\SentryScrubber:
        public: true

    # Education question generators — tagged for injection into GameSessionManager
    App\Service\Education\QcmQuestionGenerator:
        tags: ['education.question_generator']

    App\Service\Education\GameSessionManager:
        arguments:
            $generators: !tagged_iterator education.question_generator

    App\Service\Education\AcademyManager:
        arguments:
            $cache: '@academy.cache'

    App\EventListener\AcademyCacheInvalidator:
        arguments:
            $cache: '@academy.cache'

    App\Service\NewsletterService:
        arguments:
            $appSecret: '%kernel.secret%'

    App\Service\Security\AltchaManager:
        arguments:
            $altchaHmacKey: '%env(ALTCHA_HMAC_KEY)%'
            $cache: '@cache.app'

    # Monétisation — flag global + régie (ethicalads|carbon), zéro octet pub si off ou user premium
    App\Twig\Extension\AdsExtension:
        arguments:
            $enabled: '%env(bool:ADS_ENABLED)%'
            $provider: '%env(ADS_PROVIDER)%'
            $publisherId: '%env(ADS_PUBLISHER_ID)%'
            $environment: '%kernel.environment%'

    # i18n — résolution de la locale par requête (route → user → session → Accept-Language → défaut)
    App\EventSubscriber\LocaleSubscriber:
        arguments:
            $defaultLocale: '%kernel.default_locale%'

    # Moteur de compatibilité aromatique — cache des profils mortier OAV
    App\Service\Match\MortarProfileBuilder:
        arguments:
            $matchMortarProfileCache: '@match.mortar_profile.cache'

    # Cache pairs/triplets de compatibilité (O(N²)/O(N³) SQL → TTL 1h)
    App\Service\SpiceGroupFinderService:
        arguments:
            $cache: '@spice.compatibility.cache'

    # Cache des insights physico-chimiques affichés sur la page recette (Étape 3E-3)
    App\Service\Match\MatrixComparator:
        arguments:
            $cache: '@match.matrix_comparator.cache'

    App\Service\Match\CookingTimelineBuilder:
        arguments:
            $cache: '@match.cooking_timeline.cache'

    # Alias interfaces ↔ implémentations (moteur OAV)
    App\Service\Match\MatchPipelineInterface: '@App\Service\Match\MatchPipeline'
    App\Service\Match\MatchConfidenceAssessorInterface: '@App\Service\Match\MatchConfidenceAssessor'
    App\Service\Match\FlavorGraphHybridizerInterface: '@App\Service\Match\FlavorGraphHybridizer'
    App\Repository\CompoundPhysicalRepositoryInterface: '@App\Repository\CompoundPhysicalRepository'

    # Export CSV — nécessite le répertoire racine du projet
    App\Command\ExportSpicesCsvCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Validation CAS/formules via PubChem — nécessite le répertoire racine du projet
    App\Command\ValidateCompoundsCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'
