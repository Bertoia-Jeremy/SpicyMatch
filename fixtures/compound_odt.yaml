# Seuils olfactifs (ODT) — toutes matrices (air / water / oil)
# Les compound_name correspondent EXACTEMENT aux noms dans la table aromatic_compound.
#
# Unité : ppm (mg/kg équivalent milieu). OAV = concentration_spice / odt_ppm.
#
# Principes physico-chimiques :
#   - Composés hydrophobes (log P élevé, ex. D-Limonène 4.57) :
#       ODT_water >> ODT_air (faible solubilité → nécessite forte concentration pour être perçu)
#       ODT_oil > ODT_air (se dissout bien → moins volatile → seuil plus élevé)
#   - Composés polaires (log P faible, ex. Zingérone 0.90) :
#       ODT_water ≈ ODT_air (bonne solubilité → seuil peu modifié)
#       ODT_oil >> ODT_air (faible solubilité dans huile → forte perte de signal)
#
# Sources : van Gemert (2011) Compilations of Odour Threshold Values in Air, Water
# and Other Media. Valeurs approximatives dev — à remplacer par données exactes en prod.
# ──────────────────────────────────────────────────────────────────────────────────────

# ════════════════════════════════════════════════════════════════════════
#  EUGENOL — log P 2.66 (phenylpropanoïde, modérément hydrophobe)
# ════════════════════════════════════════════════════════════════════════
- compound_name: "Eugenol"
  odt_ppm: 0.005
  matrix: air
  source: "fixtures_dev (à remplacer par van Gemert 2011 p.45)"

- compound_name: "Eugenol"
  odt_ppm: 5.0
  matrix: water
  source: "fixtures_dev — rapport eau/air ~1000× (log P 2.66, faible solubilité aqueuse)"

- compound_name: "Eugenol"
  odt_ppm: 30.0
  matrix: oil
  source: "fixtures_dev — se dissout dans huile, peu volatile → seuil élevé"

