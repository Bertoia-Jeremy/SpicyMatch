# Seuils olfactifs (ODT) — données fictives pour dev/staging
# Les compound_name correspondent EXACTEMENT aux noms dans la table aromatic_compound.
# Les valeurs sont fictives mais scientifiquement ordonnées (magnitude réaliste).
# Remplacer par les vraies données van Gemert (2011) lors de la phase acquisition.
#
# Unité : ppm (mg/kg équivalent air). OAV = concentration_spice / odt_ppm.
# ──────────────────────────────────────────────────────────────────────────────────────

# ── Phénols & aldéhydes aromatiques (très bas seuils = molécules très odorantes) ────
- compound_name: "Eugenol"
  odt_ppm: 0.005
  matrix: air
  source: "fixtures_dev (à remplacer par van Gemert 2011)"

