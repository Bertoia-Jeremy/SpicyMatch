# Propriétés physico-chimiques des composés aromatiques
#
# Champs :
#   - compound_name : doit matcher EXACTEMENT le name dans aromatic_compound
#   - log_p         : XLogP3 PubChem (coefficient de partage octanol/eau, log10)
#   - boiling_point_celsius : point d'ébullition à 1 atm (NIST WebBook)
#   - vapor_pressure_pa     : tension de vapeur à 25 °C (EPA / NIST, en Pa)
#   - source        : référence bibliographique
#
# Usage côté moteur :
#   - log_p → Nernst partitioning entre phase aqueuse / phase grasse (K_ow = 10^logP)
#   - boiling_point → AromaKinetics (HEAD < 150, HEART 150-250, BASE > 250)
#                   → décroissance temporelle dans OavPartitionCalculator
#   - vapor_pressure → précision future de la cinétique de volatilisation (Étape 3+)
#
# Sources principales :
#   - PubChem (https://pubchem.ncbi.nlm.nih.gov) — XLogP3 calculé
#   - NIST WebBook (https://webbook.nist.gov) — propriétés thermo expérimentales
#   - EPA EPI Suite — vapor pressure estimées quand expérimentale absente
# ──────────────────────────────────────────────────────────────────────────────

