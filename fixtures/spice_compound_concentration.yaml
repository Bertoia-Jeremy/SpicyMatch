# Concentrations de composés aromatiques par épice — données fictives pour dev/staging
#
# Les valeurs sont fictives mais botaniquement cohérentes (relations réelles entre
# épices et familles moléculaires). Permettent de tester le moteur de compatibilité
# avant acquisition des vraies données FlavorDB / van Gemert / GC-MS.
#
# Unité : ppm (mg/kg de l'épice sèche).
# OAV = concentration_ppm / odt_ppm (doit être > 1 pour être OAV-actif).
#
# Remplacer par les vraies données lors de la phase acquisition (Sprint 2 réel).
# source_tag indique le groupe aromatique dominant pour repères gastronomiques.
# ──────────────────────────────────────────────────────────────────────────────────────

