# Mapping Spices (BDD) ↔ FlavorDB ingredient_id
#
# Usage :
#   - spice_name : valeur exacte du champ `name` dans la table `spices`
#   - flavordb_id : ID numérique de l'ingrédient dans FlavorDB API
#                   API : https://cosylab.iiitd.edu.in/flavordb2/api/ingredient/{id}
#   - flavordb_name : nom FlavorDB pour traçabilité (peut différer du nom BDD)
#   - notes : raison d'une correspondance non-triviale ou gotcha
#
# Statuts :
#   mapped    → correspondance validée
#   partial   → composés disponibles mais concentration absente pour certains
#   missing   → épice absente de FlavorDB, source alternative requise (GC-MS / FoodB)
#   todo      → à vérifier manuellement
# ──────────────────────────────────────────────────────────────────────────────────────

