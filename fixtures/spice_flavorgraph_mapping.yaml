# Crosswalk Spices (slug BDD) <-> FlavorGraph node
#
# spice_slug       : slug canonique FR de l'entité Spices (clé stable, ne dérive pas)
# flavorgraph_node : nom du nœud dans les embeddings FlavorGraph (input/nodes_191120.csv)
# status           : mapped | missing (missing = pas de nœud FG -> fallback OAV pur)
# reviewed         : true une fois la correspondance validée à la main (jamais écrasé par re-seed)
# Généré depuis data/flavorgraph/selection_100.csv (bootstrap FlavorGraph).

