    help:
        back_to_help: ← Help center
        gamification_page_title: Gamification · Help
        gamification_h1: Gamification
        gamification_body_html: |
            <h2>XP and levels</h2>
            <p>Every action on the site earns you experience (XP). Your level is computed from your total XP with a progressive curve: <code>level = ⌊(xp / 100)<sup>1/1.3</sup>⌋ + 1</code>. The higher you climb, the more XP each level requires — but there's no cap.</p>
            <h3>How to earn XP</h3>
            <ul>
                <li><strong>+10 XP</strong> — save a blend in the lab</li>
                <li><strong>+5 XP</strong> — view a new spice card (once per day per spice)</li>
                <li><strong>+75 XP</strong> — find an easter egg</li>
                <li><strong>Variable</strong> — finish an Academy game (depending on mode / difficulty)</li>
                <li><strong>Bonus</strong> — unlocking an achievement (+10 to +200 XP by rarity)</li>
            </ul>
            <h2>Reading streak</h2>
            <p>You keep a <strong>reading streak</strong> as long as you view at least one new spice card each day. A missed day resets the counter. Some achievements reward long streaks.</p>
            <h2>Daily limits</h2>
            <p>To prevent farming, the Academy limits you to <strong>5 games per mode per day</strong>. From the 4<sup>th</sup> game of the same mode, earned XP is <strong>reduced by 50%</strong> — progress is still possible but score-chasing loses its point.</p>
        gamification_disable_h2: Disable gamification
        gamification_disable_html: 'From <a href="%url%" class="text-saffron-600 hover:underline">your settings</a>, you can fully disable gamification: no more toasts, no XP banner, no avatar badge. Your data stays intact and the feature can be re-enabled at any time.'
        academy_page_title: The Academy · Help
        academy_body_html: |
            <h2>The 6 modes</h2>
            <dl>
                <dt><strong>The Chef's Choice</strong> (Quiz)</dt>
                <dd>5 multiple-choice questions on spice compatibilities. The most classic mode.</dd>
                <dt><strong>Scoville Challenge</strong> (Survival)</dt>
                <dd>Pick a starting spice and chain compatible spices. One slip = game over. Total victory if you exhaust all compatibilities.</dd>
                <dt><strong>Fine Palate</strong> (Guess Who)</dt>
                <dd>8 spices to guess from progressive clues. Fewer clues revealed = more points.</dd>
                <dt><strong>Out of Season</strong> (Intruder)</dt>
                <dd>10 questions: find the incompatible spice (or compatible, in inverted mode) among 4 choices.</dd>
                <dt><strong>Now Cooking</strong> (Hangman)</dt>
                <dd>8 spice names to guess letter by letter. Error and time limits depend on difficulty.</dd>
                <dt><strong>On High Heat</strong> (Chrono)</dt>
                <dd>Global timer. Identify as many spices as possible from their card (without the name). Speed and streak bonuses for consecutive correct answers.</dd>
            </dl>
            <h2>Difficulties</h2>
            <table class="w-full text-sm">
                <thead class="text-left"><tr><th class="py-2">Difficulty</th><th>XP multiplier</th><th>Impact</th></tr></thead>
                <tbody>
                    <tr><td>Easy</td><td>×1.0</td><td>More clues, fewer options, obvious options.</td></tr>
                    <tr><td>Medium</td><td>×1.5</td><td>Partial clues, medium options.</td></tr>
                    <tr><td>Hard</td><td>×2.0</td><td>No clue, full pool, visual traps.</td></tr>
                </tbody>
            </table>
            <h2>Scoring and XP</h2>
            <p>Base XP is <code>correct_answers × xp_per_mode × difficulty_multiplier</code>. The Fine Palate and Chrono modes add bonuses (fewer clues, speed, streak).</p>
        eggs_page_title: Easter Eggs · Help
        eggs_intro_html: 'Some unusual actions on the site trigger <strong>easter eggs</strong> — hidden discoveries that earn you 75 XP and sometimes unlock a dedicated achievement.'
        eggs_body_html: |
            <h2>What to know (no spoilers)</h2>
            <ul>
                <li><strong>Count</strong>: 8 easter eggs in total, scattered across the interface. Some are quick to find, others require patience or a combination of actions.</li>
                <li><strong>Uniqueness</strong>: each easter egg triggers only once per account. No way to farm the +75 XP by repeating the same action.</li>
                <li><strong>No spoilers</strong>: we don't list the easter eggs — that's the fun of it. You can see which ones you've found in your profile after unlocking them.</li>
            </ul>
            <h2>A few hints</h2>
            <ul>
                <li>Explore unusual corners of the site (errors, secondary pages, settings).</li>
                <li>Stay a long time on certain pages — time spent sometimes counts.</li>
                <li>Watch repetitive interactions — several clicks in the same spot may hide a trigger.</li>
                <li>Some easter eggs require a precise sequence of visited spices.</li>
                <li>A legendary 4-ingredient recipe is hidden somewhere…</li>
            </ul>
        eggs_outro: Easter eggs are a wink, not an exam — treat them as a treasure hunt, not a checklist.
