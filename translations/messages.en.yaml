            retention_text: 'Account: as long as the account is active, permanent deletion on request. Cookie consent proofs: 13 months. Contact messages: for the time needed to handle the request. Newsletter: until unsubscription.'
            cookies_title: Cookies
            cookies_text: The site only uses strictly necessary cookies (login session, storage of your consent choices), which are exempt from prior consent. No advertising or audience measurement cookie is set.
            rights_title: Your rights
            rights_text: You have the rights of access, rectification, erasure, portability and objection. From your profile you can export your data and delete your account at any time. For any other request, please use the contact page.
            complaint_title: Complaint
