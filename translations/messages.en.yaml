            data_newsletter: 'Newsletter: email address and IP address (proof of subscription) — legal basis: consent, withdrawable at any time via the unsubscribe link.'
            data_consent: 'Cookie preferences: choices made, IP address and browser (proof of consent), kept for 13 months — legal basis: legal obligation.'
