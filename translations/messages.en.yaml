    toile:
        chapter: Chapter II · The Web of Aromas
        title_html: 'The <em class="not-italic italic" style="color: var(--color-turmeric-700)">aromatic.</em> solar system'
        blurb: Each spice is a sun. Around it orbit its compounds. Click a molecule to discover all the spices that share this invisible signature.
        hud_active: Active system · CARDAMOM
        hud_stats: 6 compounds · 14 links identified
        sun_sub: Elettaria · IN
        side_title_html: 'One molecule, <em class="not-italic italic" style="color: var(--color-paprika-800)">a thousand spices.</em>'
        side_blurb: Linalool is not just a name. It's the invisible thread linking lavender to coriander, basil to cardamom. Pull the thread — a whole family appears.
        also_in: Also in
        legend_terpenic: Terpenic
        legend_piperaceae: Piperaceae
        legend_phenolic: Phenolic
        legend_woody: Woody
        mol_aria_suffix: click to see details
        m1_name: Linalool
        m1_badge: Terpene · Floral
        m1_descr: A fresh floral note with citrus accents. Found in over 200 aromatic plants — it's the signature scent of lavender, but also the secret of many others.
        m2_name: Piperine
        m2_badge: Alkaloid · Pungent
        m2_descr: The compound that gives black pepper its characteristic bite. It activates the TRPV1 receptors — the same as capsaicin, but with a woody softness.
        m3_name: α-Terpineol
        m3_badge: Terpene · Floral-Pine
        m3_descr: An aroma both floral and resinous, like lilac rubbed against a pine. Prized in perfumery as much as in Mediterranean cooking.
        m4_name: Eugenol
        m4_badge: Phenol · Woody-Clove
        m4_descr: The heart of clove. A mild anesthetic, dense scent — an unforgettable signature that lodges in olfactory memory.
        m5_name: 1,8-Cineole
        m5_badge: Oxide · Fresh-Camphor
        m5_descr: That freshness sometimes called eucalyptus-like. It opens the airways and a dish's aromatic palette with the same frankness.
        m6_name: Geraniol
        m6_badge: Terpene · Rose-Citrus
        m6_descr: The fragrant soul of geranium and rose. In cooking, a thin thread between citrus peel and petal — to be handled with reverence.
