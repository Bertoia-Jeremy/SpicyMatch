    toile:
        chapter: Capítulo II · La Red de los Aromas
        title_html: 'El sistema solar <em class="not-italic italic" style="color: var(--color-turmeric-700)">aromático.</em>'
        blurb: Cada especia es un sol. A su alrededor orbitan sus compuestos. Haz clic en una molécula para descubrir todas las especias que comparten esta firma invisible.
        hud_active: Sistema activo · CARDAMOMO
        hud_stats: 6 compuestos · 14 enlaces identificados
        sun_sub: Elettaria · IN
        side_title_html: 'Una molécula, <em class="not-italic italic" style="color: var(--color-paprika-800)">mil especias.</em>'
        side_blurb: El Linalol no es solo un nombre. Es el hilo invisible que une la lavanda con el cilantro, la albahaca con el cardamomo. Tira del hilo — aparece toda una familia.
        also_in: También en
        legend_terpenic: Terpénico
        legend_piperaceae: Piperáceas
        legend_phenolic: Fenólico
        legend_woody: Amaderado
        mol_aria_suffix: haz clic para ver los detalles
        m1_name: Linalol
        m1_badge: Terpeno · Floral
        m1_descr: Una nota floral fresca con matices cítricos. Presente en más de 200 plantas aromáticas — es la firma perfumada de la lavanda, pero también el secreto de muchas otras.
        m2_name: Piperina
        m2_badge: Alcaloide · Picante
        m2_descr: El compuesto que da a la pimienta negra su mordiente característico. Activa los receptores TRPV1 — los mismos que la capsaicina, pero con una suavidad amaderada.
        m3_name: α-Terpineol
        m3_badge: Terpeno · Floral-Pino
        m3_descr: Un aroma a la vez floral y resinoso, como lila frotada contra un pino. Apreciado tanto en perfumería como en la cocina mediterránea.
        m4_name: Eugenol
        m4_badge: Fenol · Amaderado-Clavo
        m4_descr: El corazón del clavo de olor. Anestésico suave, aroma denso — una firma imposible de olvidar que se aloja en la memoria olfativa.
        m5_name: 1,8-Cineol
        m5_badge: Óxido · Fresco-Alcanfor
        m5_descr: Esa frescura que a veces se llama eucaliptada. Abre las vías respiratorias y la paleta aromática de un plato con la misma franqueza.
        m6_name: Geraniol
        m6_badge: Terpeno · Rosa-Cítrico
        m6_descr: El alma perfumada del geranio y de la rosa. En la cocina, un hilo tenue entre la piel de cítrico y el pétalo — a manejar con reverencia.
