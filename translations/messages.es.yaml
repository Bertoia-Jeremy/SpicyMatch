    help:
        back_to_help: ← Centro de ayuda
        gamification_page_title: Gamificación · Ayuda
        gamification_h1: Gamificación
        gamification_body_html: |
            <h2>XP y niveles</h2>
            <p>Cada acción en el sitio te da experiencia (XP). Tu nivel se calcula a partir de tu XP total con una curva progresiva: <code>nivel = ⌊(xp / 100)<sup>1/1.3</sup>⌋ + 1</code>. Cuanto más subes, más XP requiere cada nivel — pero no hay tope.</p>
            <h3>Cómo ganar XP</h3>
            <ul>
                <li><strong>+10 XP</strong> — guardar una mezcla en el lab</li>
                <li><strong>+5 XP</strong> — consultar una nueva ficha de especia (una vez al día por especia)</li>
                <li><strong>+75 XP</strong> — encontrar un easter egg</li>
                <li><strong>Variable</strong> — terminar una partida de la Academia (según modo / dificultad)</li>
                <li><strong>Bonus</strong> — desbloquear un logro (+10 a +200 XP según rareza)</li>
            </ul>
            <h2>Reading streak</h2>
            <p>Mantienes un <strong>reading streak</strong> mientras consultes al menos una nueva ficha de especia cada día. Un día saltado reinicia el contador. Algunos logros recompensan las rachas largas.</p>
            <h2>Límites diarios</h2>
            <p>Para evitar el farmeo, la Academia limita a <strong>5 partidas por modo y por día</strong>. A partir de la 4.<sup>a</sup> partida de un mismo modo, el XP ganado se <strong>reduce un 50 %</strong> — el progreso sigue siendo posible pero la carrera por la puntuación pierde sentido.</p>
        gamification_disable_h2: Desactivar la gamificación
        gamification_disable_html: 'Desde <a href="%url%" class="text-saffron-600 hover:underline">tu configuración</a>, puedes desactivar por completo la gamificación: sin toasts, sin banner de XP, sin insignia de avatar. Tus datos quedan intactos y la función se puede reactivar en cualquier momento.'
        academy_page_title: La Academia · Ayuda
        academy_body_html: |
            <h2>Los 6 modos</h2>
            <dl>
                <dt><strong>La Elección del Chef</strong> (Quiz)</dt>
                <dd>10 preguntas de opción múltiple sobre compatibilidades de especias. El modo más clásico.</dd>
                <dt><strong>Desafío Scoville</strong> (Survival)</dt>
                <dd>Elige una especia de inicio y encadena especias compatibles. Un paso en falso = game over. Victoria total si agotas todas las compatibilidades.</dd>
                <dt><strong>Paladar Fino</strong> (Guess Who)</dt>
                <dd>8 especias por adivinar a partir de pistas progresivas. Menos pistas reveladas = más puntos.</dd>
                <dt><strong>Fuera de Temporada</strong> (Intruso)</dt>
                <dd>10 preguntas: encuentra la especia incompatible (o compatible, en modo invertido) entre 4 opciones.</dd>
                <dt><strong>Cocinando</strong> (Ahorcado)</dt>
                <dd>8 nombres de especias por adivinar letra a letra. Límite de errores y de tiempo según la dificultad.</dd>
                <dt><strong>A Fuego Vivo</strong> (Chrono)</dt>
                <dd>Cronómetro global. Identifica el mayor número de especias posible a partir de su ficha (sin el nombre). Bonus de velocidad y racha por respuestas correctas consecutivas.</dd>
            </dl>
            <h2>Dificultades</h2>
            <table class="w-full text-sm">
                <thead class="text-left"><tr><th class="py-2">Dificultad</th><th>Multiplicador XP</th><th>Impacto</th></tr></thead>
                <tbody>
                    <tr><td>Easy</td><td>×1.0</td><td>Más pistas, menos opciones, opciones evidentes.</td></tr>
                    <tr><td>Medium</td><td>×1.5</td><td>Pistas parciales, opciones medias.</td></tr>
                    <tr><td>Hard</td><td>×2.0</td><td>Sin pista, pool completo, trampas visuales.</td></tr>
                </tbody>
            </table>
            <h2>Puntuación y XP</h2>
            <p>El XP base es <code>respuestas_correctas × xp_por_modo × multiplicador_dificultad</code>. Los modos Paladar Fino y Chrono añaden bonus (menos pistas, rapidez, racha).</p>
        eggs_page_title: Easter Eggs · Ayuda
        eggs_intro_html: 'Algunas acciones inusuales en el sitio activan <strong>easter eggs</strong> — descubrimientos ocultos que te dan 75 XP y a veces desbloquean un logro dedicado.'
        eggs_body_html: |
            <h2>Lo que hay que saber (sin spoilers)</h2>
            <ul>
                <li><strong>Cantidad</strong>: 8 easter eggs en total, repartidos por la interfaz. Algunos son rápidos de encontrar, otros requieren paciencia o una combinación de acciones.</li>
                <li><strong>Unicidad</strong>: cada easter egg se activa una sola vez por cuenta. Imposible farmear los +75 XP repitiendo la misma acción.</li>
                <li><strong>Sin spoilers</strong>: no listamos los easter eggs — esa es la gracia. Puedes ver cuáles has encontrado en tu perfil tras desbloquearlos.</li>
            </ul>
            <h2>Algunas pistas</h2>
            <ul>
                <li>Explora los rincones inusuales del sitio (errores, páginas secundarias, ajustes).</li>
                <li>Quédate mucho tiempo en ciertas páginas — el tiempo pasado a veces cuenta.</li>
                <li>Observa las interacciones repetitivas — varios clics en el mismo sitio pueden esconder un trigger.</li>
                <li>Algunos easter eggs requieren una secuencia precisa de especias visitadas.</li>
                <li>Una receta legendaria de 4 ingredientes está escondida en algún sitio…</li>
            </ul>
        eggs_outro: Los easter eggs son un guiño, no un examen — tómalos como una búsqueda del tesoro, no como una checklist.
