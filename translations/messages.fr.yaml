    help:
        back_to_help: ← Centre d'aide
        gamification_page_title: Gamification · Aide
        gamification_h1: Gamification
        gamification_body_html: |
            <h2>XP et niveaux</h2>
            <p>Chaque action sur le site te rapporte de l'expérience (XP). Ton niveau est calculé à partir de ton XP total avec une courbe progressive : <code>niveau = ⌊(xp / 100)<sup>1/1.3</sup>⌋ + 1</code>. Plus tu montes, plus chaque niveau demande d'XP — mais il n'y a pas de plafond.</p>
            <h3>Comment gagner de l'XP</h3>
            <ul>
                <li><strong>+10 XP</strong> — sauvegarder un mélange dans le lab</li>
                <li><strong>+5 XP</strong> — consulter une nouvelle fiche épice (une seule fois par jour par épice)</li>
                <li><strong>+75 XP</strong> — trouver un easter egg</li>
                <li><strong>Variable</strong> — terminer une partie de l'Académie (selon mode / difficulté)</li>
                <li><strong>Bonus</strong> — déblocage d'un succès (+10 à +200 XP selon rareté)</li>
            </ul>
            <h2>Reading streak</h2>
            <p>Tu maintiens un <strong>reading streak</strong> tant que tu consultes au moins une nouvelle fiche épice chaque jour. Une journée sautée réinitialise le compteur. Certains succès récompensent les longues séries.</p>
            <h2>Limites quotidiennes</h2>
            <p>Pour éviter le farming, l'Académie limite à <strong>5 parties par mode et par jour</strong>. À partir de la 4<sup>e</sup> partie d'un même mode, l'XP gagné est <strong>réduit de 50 %</strong> — la progression reste possible mais la course au score perd son intérêt.</p>
        gamification_disable_h2: Désactiver la gamification
        gamification_disable_html: 'Depuis <a href="%url%" class="text-saffron-600 hover:underline">ta configuration</a>, tu peux désactiver complètement la gamification : plus de toasts, plus de bannière XP, plus de badge d''avatar. Tes données restent intactes et la fonctionnalité reste réactivable à tout moment.'
        academy_page_title: L'Académie · Aide
        academy_body_html: |
            <h2>Les 6 modes</h2>
            <dl>
                <dt><strong>Le Choix du Chef</strong> (QCM)</dt>
                <dd>5 questions à choix multiples sur les compatibilités d'épices. Le mode le plus classique.</dd>
                <dt><strong>Défi de Scoville</strong> (Survival)</dt>
                <dd>Choisis une épice de départ et enchaîne des épices compatibles. Un faux pas = game over. Victoire totale si tu épuises toutes les compatibilités.</dd>
                <dt><strong>Palais Fin</strong> (Guess Who)</dt>
                <dd>8 épices à deviner à partir d'indices progressifs. Moins d'indices révélés = plus de points.</dd>
                <dt><strong>Hors Saison</strong> (Intrus)</dt>
                <dd>10 questions : trouve l'épice incompatible (ou compatible, en mode inversé) parmi 4 choix.</dd>
                <dt><strong>Cuisson en Cours</strong> (Pendu)</dt>
                <dd>8 noms d'épices à deviner lettre par lettre. Limite d'erreurs et de temps selon la difficulté.</dd>
                <dt><strong>À Feu Vif</strong> (Chrono)</dt>
                <dd>Chronomètre global. Identifie le plus d'épices possible à partir de leur fiche (sans le nom). Bonus vitesse et streak pour les bonnes réponses consécutives.</dd>
            </dl>
            <h2>Difficultés</h2>
            <table class="w-full text-sm">
                <thead class="text-left"><tr><th class="py-2">Difficulté</th><th>Multiplicateur XP</th><th>Impact</th></tr></thead>
                <tbody>
                    <tr><td>Easy</td><td>×1.0</td><td>Plus d'indices, moins d'options, options évidentes.</td></tr>
                    <tr><td>Medium</td><td>×1.5</td><td>Indices partiels, options moyennes.</td></tr>
                    <tr><td>Hard</td><td>×2.0</td><td>Pas d'indice, pool complet, pièges visuels.</td></tr>
                </tbody>
            </table>
            <h2>Scoring et XP</h2>
            <p>L'XP de base est <code>bonnes_réponses × xp_par_mode × multiplicateur_difficulté</code>. Les modes Palais Fin et Chrono ajoutent des bonus (moins d'indices, rapidité, streak).</p>
        eggs_page_title: Easter Eggs · Aide
        eggs_intro_html: 'Certaines actions inhabituelles sur le site déclenchent des <strong>easter eggs</strong> — des découvertes cachées qui te font gagner 75 XP et débloquent parfois un succès dédié.'
        eggs_body_html: |
            <h2>Ce qu'il faut savoir (sans spoiler)</h2>
            <ul>
                <li><strong>Nombre</strong> : 8 easter eggs au total, disséminés dans l'interface. Certains sont rapides à trouver, d'autres demandent de la patience ou une combinaison d'actions.</li>
                <li><strong>Unicité</strong> : chaque easter egg se déclenche une seule fois par compte. Impossible de farmer les +75 XP en rejouant la même action.</li>
                <li><strong>Sans preuve</strong> : on ne liste pas les easter eggs — c'est le sel du jeu. Tu peux voir lesquels tu as trouvés dans ton profil après les avoir débloqués.</li>
            </ul>
            <h2>Quelques pistes</h2>
            <ul>
