        title: SpicyMatch — L'Odyssée des Arômes
    toile:
        chapter: Chapitre II · La Toile des Arômes
        title_html: 'Le système solaire <em class="not-italic italic" style="color: var(--color-turmeric-700)">aromatique.</em>'
        blurb: Chaque épice est un soleil. Autour, gravitent ses composés. Cliquez une molécule pour découvrir toutes les épices qui partagent cette signature invisible.
        hud_active: Système actif · CARDAMOME
        hud_stats: 6 composés · 14 liens identifiés
        sun_sub: Elettaria · IN
        side_title_html: 'Une molécule, <em class="not-italic italic" style="color: var(--color-paprika-800)">mille épices.</em>'
        side_blurb: Le Linalol n'est pas qu'un nom. C'est le fil invisible qui relie la lavande à la coriandre, le basilic à la cardamome. Tirez le fil — toute une famille apparaît.
        also_in: Aussi dans
        legend_terpenic: Terpénique
        legend_piperaceae: Pipéracée
        legend_phenolic: Phénolique
        legend_woody: Boisé
        mol_aria_suffix: cliquer pour voir les détails
        m1_name: Linalol
        m1_badge: Terpène · Floral
        m1_descr: Note florale fraîche aux accents d'agrumes. Présent dans plus de 200 plantes aromatiques — c'est la signature parfumée de la lavande, mais aussi le secret de bien d'autres.
        m2_name: Pipérine
        m2_badge: Alcaloïde · Piquant
        m2_descr: Le composé qui donne au poivre noir son mordant caractéristique. Active les récepteurs TRPV1 — les mêmes que la capsaïcine, mais avec une douceur boisée.
        m3_name: α-Terpinéol
        m3_badge: Terpène · Floral-Pin
        m3_descr: Arôme à la fois floral et résineux, comme du lilas frotté contre un pin. Apprécié en parfumerie autant qu'en cuisine méditerranéenne.
        m4_name: Eugénol
        m4_badge: Phénol · Boisé-Clou
        m4_descr: Le cœur du clou de girofle. Anesthésique léger, parfum dense — une signature impossible à oublier qui se loge dans la mémoire olfactive.
        m5_name: 1,8-Cinéole
        m5_badge: Oxyde · Frais-Camphré
        m5_descr: Cette fraîcheur qu'on appelle parfois eucalyptée. Ouvre les voies respiratoires et la palette aromatique d'un plat avec la même franchise.
        m6_name: Géraniol
        m6_badge: Terpène · Rose-Citrus
        m6_descr: L'âme parfumée du géranium et de la rose. En cuisine, un fil ténu entre la peau d'agrume et le pétale — à manier avec révérence.
